<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');
  body {
    width: 1080px;
    height: 1080px;
    overflow: hidden;
    font-family: 'Inter', sans-serif;
    background: linear-gradient(135deg, #0F172A 0%, #0f2952 50%, #0F172A 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }
  .circle1 {
    position: absolute;
    width: 500px; height: 500px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(37,99,235,0.15) 0%, transparent 70%);
    top: -100px; right: -100px;
  }
  .circle2 {
    position: absolute;
    width: 400px; height: 400px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(37,99,235,0.10) 0%, transparent 70%);
    bottom: -100px; left: -50px;
  }
  .dots {
    position: absolute;
    inset: 0;
    background-image: radial-gradient(rgba(255,255,255,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
  }
  .content {
    position: relative;
    z-index: 10;
    text-align: center;
    padding: 80px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 32px;
  }
  .badge {
    background: rgba(37,99,235,0.25);
    border: 1px solid rgba(37,99,235,0.5);
    color: #93C5FD;
    font-size: 18px;
    font-weight: 600;
    padding: 10px 28px;
    border-radius: 100px;
    letter-spacing: 0.5px;
  }
  .number {
    font-size: 200px;
    font-weight: 900;
    color: rgba(37,99,235,0.12);
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    line-height: 1;
    user-select: none;
  }
  h1 {
    font-size: 72px;
    font-weight: 900;
    color: #FFFFFF;
    line-height: 1.1;
    letter-spacing: -2px;
    max-width: 800px;
  }
  h1 span { color: #60A5FA; }
  .sub {
    font-size: 26px;
    color: rgba(255,255,255,0.5);
    font-weight: 400;
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  .arrow {
    font-size: 22px;
    color: #60A5FA;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .logo {
    position: absolute;
    bottom: 48px;
    right: 56px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .logo-icon {
    width: 36px; height: 36px;
    background: #2563EB;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }
  .logo-text {
    font-size: 18px;
    font-weight: 700;
    color: rgba(255,255,255,0.7);
  }
  .slide-num {
    position: absolute;
    bottom: 52px;
    left: 56px;
    font-size: 16px;
    color: rgba(255,255,255,0.3);
    font-weight: 500;
  }
  .bar {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 4px;
    background: linear-gradient(90deg, #2563EB, #60A5FA, #2563EB);
  }
</style>
</head>
<body>
  <div class="circle1"></div>
  <div class="circle2"></div>
  <div class="dots"></div>
  <div class="number">5</div>
  <div class="content">
    <div class="badge">🤖 Automatización con IA</div>
    <h1><span>5 procesos</span> que puedes automatizar esta semana</h1>
    <div class="sub">Sin programar · Sin inversión enorme</div>
    <div class="arrow">Desliza para descubrirlos →</div>
  </div>
  <div class="logo">
    <div class="logo-icon">✦</div>
    <div class="logo-text">Automatización Procesos IA</div>
  </div>
  <div class="slide-num">1 / 7</div>
  <div class="bar"></div>
</body>
</html>
