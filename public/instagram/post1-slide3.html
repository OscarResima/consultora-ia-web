<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');
  body {
    width: 1080px; height: 1080px; overflow: hidden;
    font-family: 'Inter', sans-serif;
    background: linear-gradient(135deg, #0F172A 0%, #0f2952 50%, #0F172A 100%);
    display: flex; align-items: center; justify-content: center; position: relative;
  }
  .dots { position: absolute; inset: 0; background-image: radial-gradient(rgba(255,255,255,0.04) 1px, transparent 1px); background-size: 40px 40px; }
  .content { position: relative; z-index: 10; width: 880px; display: flex; flex-direction: column; gap: 40px; }
  .num-badge { font-size: 22px; font-weight: 800; color: #2563EB; background: rgba(37,99,235,0.15); border: 1px solid rgba(37,99,235,0.4); width: 64px; height: 64px; border-radius: 18px; display: flex; align-items: center; justify-content: center; }
  .icon-big { font-size: 80px; }
  h2 { font-size: 68px; font-weight: 900; color: #FFFFFF; line-height: 1.05; letter-spacing: -2px; }
  h2 span { color: #60A5FA; }
  .desc { font-size: 28px; color: rgba(255,255,255,0.6); line-height: 1.5; font-weight: 400; max-width: 750px; }
  .saving { display: flex; align-items: center; gap: 16px; background: rgba(37,99,235,0.15); border: 1px solid rgba(37,99,235,0.3); border-radius: 16px; padding: 20px 28px; width: fit-content; }
  .saving-icon { font-size: 28px; }
  .saving-text { font-size: 24px; font-weight: 700; color: #93C5FD; }
  .logo { position: absolute; bottom: 48px; right: 56px; display: flex; align-items: center; gap: 10px; }
  .logo-icon { width: 36px; height: 36px; background: #2563EB; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
  .logo-text { font-size: 18px; font-weight: 700; color: rgba(255,255,255,0.6); }
  .slide-num { position: absolute; bottom: 52px; left: 56px; font-size: 16px; color: rgba(255,255,255,0.3); }
  .bar { position: absolute; bottom: 0; left: 0; right: 0; height: 4px; background: linear-gradient(90deg, #2563EB, #60A5FA, #2563EB); }
  .accent-line { width: 80px; height: 5px; background: #2563EB; border-radius: 3px; }
</style>
</head>
<body>
  <div class="dots"></div>
  <div class="content">
    <div style="display:flex; align-items:center; gap:20px;"><div class="num-badge">02</div><div class="icon-big">📧</div></div>
    <div class="accent-line"></div>
    <h2>Emails de<br><span>Seguimiento</span></h2>
    <div class="desc">Detecta leads sin responder y envía follow-up personalizado automáticamente.</div>
    <div class="saving"><div class="saving-icon">⏱</div><div class="saving-text">1 hora/día → 0 minutos</div></div>
  </div>
  <div class="logo"><div class="logo-icon">✦</div><div class="logo-text">Automatización Procesos IA</div></div>
  <div class="slide-num">3 / 7</div>
  <div class="bar"></div>
</body>
</html>
